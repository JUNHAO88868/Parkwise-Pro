<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise v15.0</title>
    <style>
        /* --- 1. 全局死锁 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- 2. 顶部仪表 --- */
        .top-panel {
            flex: 0 0 auto; height: 150px;
            background: #1E1E1E; border-bottom: 1px solid #333;
            display: flex; align-items: center; padding: 0 15px;
            justify-content: space-between;
        }

        .ring-box { width: 115px; height: 115px; position: relative; flex-shrink: 0; } 
        svg { width: 100%; height: 100%; } 
        circle { 
            fill: none; stroke-width: 8; stroke-linecap: round; 
            transform: rotate(-90deg); transform-origin: 50% 50%; 
        }
        .bg-ring { stroke: #333; }
        .progress-ring { stroke: #00E676; transition: stroke-dashoffset 0.1s linear; }
        
        .svg-text { fill: white; font-weight: bold; font-size: 26px; text-anchor: middle; dominant-baseline: central; }
        .svg-sub { fill: #888; font-size: 10px; text-anchor: middle; dominant-baseline: central; }

        .data-grid { 
            flex: 1; margin-left: 25px; 
            display: flex; flex-direction: column; gap: 6px; 
        }
        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #282828; padding: 6px 12px; border-radius: 6px;
        }
        .d-label { font-size: 11px; color: #aaa; }
        .d-val { font-size: 14px; font-weight: bold; }
        .hl-entry { color: #00E676; font-size: 16px; }
        .hl-cost { color: #FFC107; }

        /* --- 3. 中控按钮 --- */
        .ctrl-panel { flex: 0 0 auto; padding: 10px 15px; background: #121212; }
        .big-btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-go { background: #00E676; color: #000; box-shadow: 0 4px 12px rgba(0,230,118,0.3); }
        .btn-stop { background: #333; color: #FF5252; border: 1px solid #FF5252; display: none; }

        /* --- 4. Tab 导航 --- */
        .tab-bar { flex: 0 0 auto; display: flex; background: #1E1E1E; border-bottom: 1px solid #333; }
        .tab {
            flex: 1; text-align: center; padding: 12px 0; font-size: 13px; color: #666; transition: 0.2s;
        }
        .tab.active { color: #00E676; border-bottom: 2px solid #00E676; background: rgba(0,230,118,0.05); font-weight: bold; }

        /* --- 5. 内容区 --- */
        .main-area { 
            flex: 1; position: relative; background: #121212; 
            overflow: hidden;
        }
        
        .page {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            padding: 15px 15px 45px 15px; 
            display: none; flex-direction: column;
        }
        .page.active { display: flex; }

        /* --- Page 1 样式 --- */
        .sec-title { font-size: 11px; color: #888; margin: 8px 0 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .chip-group { 
            display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; padding-bottom: 2px;
            flex: 0 0 auto; 
        }
        .chip-group::-webkit-scrollbar { display: none; } 
        .chip {
            flex: 0 0 auto; padding: 6px 14px; background: #282828; border-radius: 18px;
            font-size: 12px; color: #bbb; border: 1px solid transparent; transition: 0.2s;
        }
        .chip.active { background: #00E676; color: #000; font-weight: bold; border-color: #00E676; }
        .step-container {
            margin-top: 5px; padding: 8px; border-radius: 8px;
            background: #1a1a1a; border: 1px solid #333;
            transition: 0.3s; opacity: 0.4; pointer-events: none; filter: grayscale(100%);
        }
        .step-container.enabled {
            opacity: 1; pointer-events: auto; filter: none;
            background: rgba(255,193,7,0.05); border-color: rgba(255,193,7,0.3);
        }
        .chk-label { display: flex; align-items: center; font-size: 12px; color: white; gap: 5px; }
        .chk-input { width: 16px; height: 16px; accent-color: #00E676; }
        
        .confirm-btn {
            margin-top: auto; 
            background: #282828; color: #00E676; border: 1px solid #00E676;
            padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 14px;
        }
        /* 激活状态样式 */
        .confirm-btn.locked {
            background: #00E676; color: #000; pointer-events: none; opacity: 1;
        }


        /* --- Page 2: 扫码与位置 --- */
        #p2 { justify-content: space-between; }

        /* 1. 扫码区 (极简直连) */
        .scan-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            flex: 0 0 auto; 
            margin-bottom: 10px;
        }
        .scan-btn {
            height: 55px; border-radius: 10px; display: flex; 
            align-items: center; justify-content: center;
            text-decoration: none; color: white; font-weight: bold; font-size: 16px;
            transition: transform 0.1s;
        }
        .scan-btn:active { transform: scale(0.96); }
        /* 直连Scheme */
        .ali { background: #1677FF; }
        .wx { background: #07C160; }
        
        /* 2. 拍照区 (预览图点击放大) */
        .cam-bar { 
            display: flex; gap: 10px; height: 110px; 
            flex: 0 0 auto; 
            background: #1A1A1A; border-radius: 12px; padding: 8px; border: 1px solid #333;
        }
        .cam-btn {
            width: 90px; 
            background: #282828; border: 1px dashed #555; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; color: #888; position: relative; overflow: hidden;
        }
        .cam-btn img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; z-index: 2; }
        
        /* 输入框优化 */
        .note-box {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 32px; /* 字体加大 */
            color: #00E676; font-weight: bold;
            overflow: hidden;
        }
        .ph-text { color: #555; font-size: 13px; font-weight: normal; }

        /* 3. 键盘区 */
        .kb-grid {
            flex: 0 0 auto; 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
        }
        .key {
            height: 38px; background: #282828; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 15px; box-shadow: 0 1px 0 #111;
        }
        .key:active { background: #333; transform: translateY(1px); }
        .k-yl { color: #FFC107; } .k-red { color: #FF5252; background: #322; }

        /* --- 大图查看器 (Lightbox) --- */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200;
            display: none; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .lightbox.show { display: flex; }
        .lightbox img { width: 100%; height: auto; max-height: 90vh; object-fit: contain; }
        .lb-tip { color: #888; margin-top: 10px; font-size: 12px; }

    </style>
</head>
<body>

    <!-- 大图查看层 -->
    <div class="lightbox" id="lightbox" onclick="closeBigImg()">
        <img id="big-img-tag">
        <div class="lb-tip">点击任意处关闭</div>
    </div>

    <!-- 顶部仪表 -->
    <div class="top-panel">
        <div class="ring-box">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" class="bg-ring"></circle>
                <circle cx="50" cy="50" r="46" class="progress-ring" id="ring"></circle>
                <text x="50" y="45" class="svg-text" id="main-timer">00:00</text>
                <text x="50" y="65" class="svg-sub" id="timer-lbl">等待开始</text>
            </svg>
        </div>
        <div class="data-grid">
            <div class="data-row">
                <span class="d-label">进场时间</span>
                <span class="d-val hl-entry" id="entry-time">--:--</span>
            </div>
            <div class="data-row">
                <span class="d-label">已停时长</span>
                <span class="d-val" id="elapsed">0m 0s</span>
            </div>
            <div class="data-row">
                <span class="d-label">预计费用</span>
                <span class="d-val hl-cost" id="cost">¥0.0</span>
            </div>
        </div>
    </div>

    <!-- 启动按钮 -->
    <div class="ctrl-panel">
        <button class="big-btn btn-go" id="btn-go" onclick="start()">🚗 准备开始停车</button>
        <button class="big-btn btn-stop" id="btn-stop" onclick="stop()">🛑 结束停车结算</button>
    </div>

    <!-- 标签栏 -->
    <div class="tab-bar">
        <div class="tab active" onclick="setTab(0)">⚙️ 计费规则</div>
        <div class="tab" onclick="setTab(1)">📍 位置记录</div>
    </div>

    <!-- 内容区 -->
    <div class="main-area">
        
        <!-- 页面 1: 计费规则 -->
        <div class="page active" id="p1">
            <div class="sec-title">免停时长</div>
            <div class="chip-group">
                <div class="chip" onclick="sel(this, 'free', 30)">30分</div>
                <div class="chip active" onclick="sel(this, 'free', 60)">1小时</div>
                <div class="chip" onclick="sel(this, 'free', 120)">2小时</div>
                <div class="chip" onclick="sel(this, 'free', 180)">3小时</div>
            </div>

            <div class="sec-title">基础费率 (元/时)</div>
            <div class="chip-group">
                <div class="chip" onclick="sel(this, 'rate', 2)">2元</div>
                <div class="chip" onclick="sel(this, 'rate', 3)">3元</div>
                <div class="chip" onclick="sel(this, 'rate', 4)">4元</div>
                <div class="chip active" onclick="sel(this, 'rate', 5)">5元</div>
                <div class="chip" onclick="sel(this, 'rate', 6)">6元</div>
            </div>

            <div class="sec-title" style="margin-top:10px;">
                <label class="chk-label">
                    <input type="checkbox" class="chk-input" id="step-chk" onchange="toggleStep()">
                    启用阶梯/变价模式
                </label>
            </div>

            <div class="step-container" id="step-area">
                <div class="sec-title" style="color:#FFC107; margin-top:0;">变价时间点 (入场后)</div>
                <div class="chip-group">
                    <div class="chip active" onclick="sel(this, 'sh', 1)">1小时</div>
                    <div class="chip" onclick="sel(this, 'sh', 2)">2小时</div>
                    <div class="chip" onclick="sel(this, 'sh', 3)">3小时</div>
                </div>

                <div class="sec-title" style="color:#FFC107;">第二阶段费率 (元/时)</div>
                <div class="chip-group">
                    <div class="chip" onclick="sel(this, 'sr', 2)">2元</div>
                    <div class="chip" onclick="sel(this, 'sr', 3)">3元</div>
                    <div class="chip active" onclick="sel(this, 'sr', 4)">4元</div>
                    <div class="chip" onclick="sel(this, 'sr', 5)">5元</div>
                </div>
            </div>

            <button class="confirm-btn" id="rule-btn" onclick="saveRules()">✅ 确认规则生效</button>
        </div>

        <!-- 页面 2: 扫码与位置 -->
        <div class="page" id="p2">
            
            <!-- 1. 扫码区 (直接打开APP) -->
            <div class="scan-grid">
                <a class="scan-btn ali" href="alipays://">打开支付宝</a>
                <a class="scan-btn wx" href="weixin://">打开微信</a>
            </div>

            <!-- 2. 拍照区 (可全屏预览) -->
            <div class="cam-bar">
                <div class="cam-btn" onclick="clickCamera()">
                    <span style="font-size:20px">📷</span>
                    <img id="preview" onclick="showBigImg(event)">
                </div>
                <!-- capture="environment" 强制请求后置相机 -->
                <input type="file" id="file" accept="image/*" capture="environment" style="display:none" onchange="photo(this)">
                <div class="note-box" id="note">
                    <span class="ph-text">点键盘记录...</span>
                </div>
            </div>

            <!-- 3. 键盘区 -->
            <div class="kb-grid">
                <div class="key k-yl" onclick="key('B1')">B1</div>
                <div class="key k-yl" onclick="key('B2')">B2</div>
                <div class="key k-yl" onclick="key('B3')">B3</div>
                <div class="key k-yl" onclick="key('F1')">F1</div>
                <div class="key k-red" onclick="del()">←</div>

                <div class="key" onclick="key('1')">1</div>
                <div class="key" onclick="key('2')">2</div>
                <div class="key" onclick="key('3')">3</div>
                <div class="key" onclick="key('4')">4</div>
                <div class="key" onclick="key('5')">5</div>
                
                <div class="key" onclick="key('6')">6</div>
                <div class="key" onclick="key('7')">7</div>
                <div class="key" onclick="key('8')">8</div>
                <div class="key" onclick="key('9')">9</div>
                <div class="key" onclick="key('0')">0</div>
            </div>
        </div>

    </div>

    <script>
        let cfg = { free: 60, rate: 5, isStep: false, sh: 1, sr: 4 }; 
        let run = { active: false, start: null, timer: null }; 
        let noteVal = "";

        function setTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===idx));
        }

        function sel(el, key, val) {
            if(run.active) return alert("停车中不可修改");
            if((key==='sh' || key==='sr') && !cfg.isStep) return;
            let siblings = el.parentElement.children;
            for(let s of siblings) s.classList.remove('active');
            el.classList.add('active');
            cfg[key] = val;
        }

        function toggleStep() {
            if(run.active) {
                document.getElementById('step-chk').checked = cfg.isStep;
                return alert("停车中不可修改");
            }
            cfg.isStep = document.getElementById('step-chk').checked;
            let area = document.getElementById('step-area');
            if(cfg.isStep) area.classList.add('enabled'); else area.classList.remove('enabled');
        }

        // 修改后的确认规则逻辑：一直保持绿色的“已生效”状态
        function saveRules() {
            if(navigator.vibrate) navigator.vibrate(50);
            let btn = document.getElementById('rule-btn');
            btn.innerText = "规则已生效";
            btn.classList.add('locked'); // 添加锁定样式，防止再次点击
        }

        function start() {
            if(run.active) return;
            run.start = new Date();
            run.active = true;

            document.getElementById('btn-go').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'flex';
            
            let h = run.start.getHours().toString().padStart(2,'0');
            let m = run.start.getMinutes().toString().padStart(2,'0');
            document.getElementById('entry-time').innerText = `${h}:${m}`;
            document.getElementById('timer-lbl').innerText = "免停倒计时";

            loop(); 
            run.timer = setInterval(loop, 1000);
        }

        function stop() {
            clearInterval(run.timer);
            run.active = false;
            let c = document.getElementById('cost').innerText;
            if(confirm(`结算完成，费用 ${c}\n是否重置？`)) location.reload();
        }

        function loop() {
            if(!run.start) return;
            let now = new Date();
            let diffSec = Math.floor((now - run.start) / 1000);
            
            let dH = Math.floor(diffSec / 3600);
            let dM = Math.floor((diffSec % 3600) / 60);
            let dS = diffSec % 60;
            document.getElementById('elapsed').innerText = `${dH>0?dH+'h ':''}${dM}m ${dS}s`;

            let cost = 0;
            let totalMin = diffSec / 60;
            
            if(totalMin > cfg.free) {
                if(!cfg.isStep) {
                    cost = ((diffSec - cfg.free*60)/3600) * cfg.rate;
                } else {
                    let stepMin = cfg.sh * 60;
                    let m1 = 0, m2 = 0;
                    if(totalMin <= stepMin) {
                        m1 = totalMin - cfg.free;
                    } else {
                        m1 = stepMin - cfg.free;
                        m2 = totalMin - stepMin;
                    }
                    if(m1 < 0) m1 = 0;
                    cost = (m1/60)*cfg.rate + (m2/60)*cfg.sr;
                }
            }
            document.getElementById('cost').innerText = `¥${cost.toFixed(1)}`;

            let freeSec = cfg.free * 60;
            let remain = freeSec - diffSec;
            
            const ring = document.getElementById('ring');
            const circ = 46 * 2 * Math.PI; 
            ring.style.strokeDasharray = `${circ} ${circ}`;

            if(remain > 0) {
                let rM = Math.floor(remain/60);
                let rS = remain%60;
                document.getElementById('main-timer').textContent = `${rM}:${rS.toString().padStart(2,'0')}`;
                document.getElementById('main-timer').style.fill = "white";
                
                let offset = circ - ((remain/freeSec) * circ);
                ring.style.strokeDashoffset = offset;
                
                if(remain <= 900) ring.style.stroke = "#FFC107";
                else ring.style.stroke = "#00E676";
            } else {
                document.getElementById('main-timer').textContent = "超时";
                document.getElementById('main-timer').style.fill = "#FF5252";
                document.getElementById('timer-lbl').innerText = "计费中";
                ring.style.stroke = "#FF5252";
                ring.style.strokeDashoffset = 0;
            }
        }

        function key(k) {
            noteVal += (k.startsWith('B')||k.startsWith('F')) ? k+" " : k;
            updateNote();
        }
        function del() {
            noteVal = noteVal.slice(0,-1);
            updateNote();
        }
        function updateNote() {
            const el = document.getElementById('note');
            if(noteVal === "") {
                el.innerHTML = '<span class="ph-text">点键盘记录...</span>';
            } else {
                el.innerText = noteVal;
            }
        }
        
        // 拍照与大图相关逻辑
        function clickCamera() {
            // 如果没有照片，点击是触发文件选择；如果有照片，点击img是触发预览，点击btn背景不处理
            if(document.getElementById('preview').style.display !== 'block') {
                document.getElementById('file').click();
            }
        }

        function photo(inp) {
            if(inp.files[0]) {
                let r = new FileReader();
                r.onload = e => {
                    let img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    // 同步设置给大图
                    document.getElementById('big-img-tag').src = e.target.result;
                }
                r.readAsDataURL(inp.files[0]);
            }
        }

        function showBigImg(e) {
            e.stopPropagation(); // 防止触发 file input
            document.getElementById('lightbox').classList.add('show');
        }

        function closeBigImg() {
            document.getElementById('lightbox').classList.remove('show');
        }
    </script>
</body>
</html>
